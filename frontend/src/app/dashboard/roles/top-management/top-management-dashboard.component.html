<div class="role-dashboard top-management">
    <div class="welcome-banner">
        <h2><i class="fas fa-chart-line"></i> {{ title }}</h2>
        <p>Vision strategique, indicateurs cles et aide a la decision.</p>
    </div>

    <div class="dashboard-grid" *ngIf="filteredModules.length > 0; else noModules">
        <div *ngFor="let m of filteredModules" class="module-card premium">
            <div class="card-icon"><i class="fas fa-eye"></i></div>
            <h3>{{ m.title }}</h3>
            <p class="desc">{{ m.desc }}</p>
            <ul class="submodules-list">
                <li *ngFor="let s of m.submodules" (click)="onOpenModule(m, s)">
                    <i class="fas fa-chevron-right"></i> {{ s.title }}
                </li>
            </ul>
        </div>
    </div>

    <ng-template #noModules>
        <div class="empty-state">
            <i class="fas fa-folder-open"></i>
            <p>Aucun module fonctionnel n'est assigne a votre role.</p>
        </div>
    </ng-template>
</div>
