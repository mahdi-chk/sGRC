<div class="header-actions">
    <h1><i class="fas fa-tasks"></i> Modèles de Check-Lists (Paramétrables)</h1>
    <button class="btn-primary" (click)="openCreateModal()"><i class="fas fa-plus"></i> Nouveau Modèle</button>
</div>

<div class="loader" *ngIf="isLoading">Chargement...</div>

<div class="templates-grid" *ngIf="!isLoading">
    <div *ngIf="templates.length === 0" class="empty-state">
        <p>Aucun modèle de checklist pour le moment.</p>
    </div>

    <div class="card" *ngFor="let template of templates">
        <div class="card-header">
            <h3>{{ template.titre }}</h3>
            <button class="icon-btn delete" (click)="deleteTemplate(template.id)" title="Supprimer">
                <i class="fas fa-trash"></i>
            </button>
        </div>
        <div class="card-body">
            <p class="desc" *ngIf="template.description">{{ template.description }}</p>
            <ul class="items-list">
                <li *ngFor="let item of template.items">
                    <i class="far fa-square" style="color:#004a99"></i> {{ item.texte }}
                </li>
            </ul>
        </div>
    </div>
</div>

<!-- Modal Creation -->
<div class="modal-overlay" *ngIf="showModal" (click)="showModal=false">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2>Créer un modèle de Checklist</h2>
            <button class="close-btn" (click)="showModal=false"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body form-container">
            <div class="form-group">
                <label>Titre du modèle</label>
                <input type="text" [(ngModel)]="newTemplate.titre" placeholder="Ex: Checklist Audit Informatique" />
            </div>
            <div class="form-group">
                <label>Description (Optionnelle)</label>
                <textarea [(ngModel)]="newTemplate.description" rows="2" placeholder="Description du modèle..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Éléments à vérifier</label>
                <div class="item-input-row" *ngFor="let item of newTemplate.items; let i = index; trackBy: trackByFn">
                    <input type="text" [(ngModel)]="newTemplate.items[i]" placeholder="Point de contrôle..." />
                    <button class="icon-btn remove" (click)="removeItem(i)" *ngIf="newTemplate.items.length > 1">
                        <i class="fas fa-minus-circle"></i>
                    </button>
                </div>
                <button class="btn-secondary" (click)="addItem()"><i class="fas fa-plus"></i> Ajouter un point</button>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" (click)="showModal=false">Annuler</button>
            <button class="btn-primary" (click)="saveTemplate()">Enregistrer</button>
        </div>
    </div>
</div>
