<div class="login-wrapper">
  <!-- Decorative background elements -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">
          <i class="fas fa-shield-alt"></i>
        </div>
        <h1>sGRC</h1>
        <p>Plateforme de Gouvernance, Risque et Conformité</p>
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
        <div class="form-header">
          <h2>Connexion</h2>
          <p class="subtitle">Entrez vos identifiants pour accéder au dashboard</p>
        </div>

        <div *ngIf="error" class="error-message">
          <i class="fas fa-exclamation-circle"></i>
          {{ error }}
        </div>

        <div class="form-body">
          <div class="form-group">
            <label for="email">Email</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope input-icon"></i>
              <input type="email" id="email" name="email" [(ngModel)]="credentials.mail" required
                placeholder="mail@gmail.com" />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Mot de passe</label>
            <div class="input-wrapper">
              <i class="fas fa-lock input-icon"></i>
              <input [type]="showPassword ? 'text' : 'password'" id="password" name="password"
                [(ngModel)]="credentials.password" required placeholder="••••••••" />
              <button type="button" class="btn-toggle" (click)="togglePasswordVisibility()" title="Afficher/Masquer">
                <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-submit" [disabled]="!loginForm.form.valid || loading">
            <span *ngIf="!loading">Se connecter</span>
            <span *ngIf="loading" class="loading-spinner">
              <i class="fas fa-circle-notch fa-spin"></i> Connexion...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
